---
apiVersion: kustomize.toolkit.fluxcd.io/v1
kind: Kustomization
metadata:
  name: boutique-gatewayapi
  namespace: flux-system
spec:
  interval: 10m
  path: ./infrastructure/gateway_api/boutique
  prune: true
  sourceRef:
    kind: GitRepository
    name: flux-system
  postBuild:
    substituteFrom:
      - kind: ConfigMap
        name: cluster-settings # Injects boutique.gslb.thencpnutanix.com

---
apiVersion: kustomize.toolkit.fluxcd.io/v1
kind: Kustomization
metadata:
  name: boutique-gslb
  namespace: flux-system
spec:
  interval: 10m
  path: ./infrastructure/gslb/boutique
  prune: true
  sourceRef:
    kind: GitRepository
    name: flux-system

---
apiVersion: kustomize.toolkit.fluxcd.io/v1
kind: Kustomization
metadata:
  name: boutique-app
  namespace: flux-system
spec:
  interval: 10m
  path: ./apps/boutique/base
  prune: true
  sourceRef:
    kind: GitRepository
    name: flux-system
