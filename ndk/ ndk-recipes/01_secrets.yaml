### Create these on both clusters

# Create a namespace to run all the failover operations.
kubectl create ns ndk-dr

---
# Create secrets for source and target kubeconfigs.
kubectl -n ndk-dr create secret generic source-kubeconfig-secret --from-file=config=nkp-primary.conf --save-config --dry-run=client -o yaml | kubectl apply -f -

kubectl -n ndk-dr create secret generic target-kubeconfig-secret --from-file=config=nkp-dr.conf --save-config --dry-run=client -o yaml | kubectl apply -f -

---
# Create source and target PC credentials secrets.
kubectl create secret generic ndk-failover-primary-pc-creds --namespace=ndk-dr --from-literal=key='IP:9440:admin:xyz'

kubectl create secret generic ndk-failover-secondary-pc-creds --namespace=ndk-dr --from-literal=key='IP:9440:admin:xyz'


---
# Create secret for pulling failover job image from private registry.
kubectl -n ndk-dr create secret docker-registry recipe-pull-secret --docker-server=harbor.thencpnutanix.com/ndk/recipes:2.0.0 --docker-username=admin --docker-password=xyz
