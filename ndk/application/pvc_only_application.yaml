### NDK handles failover of only storage. 
### GitOps synchronization for application and networking manifests. Create Kustomization for path: "../networking/ and path: "./application/". 

apiVersion: dataservices.nutanix.com/v1alpha1
kind: Application
metadata:
 name: wordpress
 namespace: wordpress
spec:
 applicationSelector:
  resourceLabelSelectors:
   - excludeResources: 
     - group: k8gb.io
       kind: Gslb
     - group: ""
       kind: ConfigMap
     - group: ""
       kind: ServiceAccount
     - group: ""
       kind: Secret
     - group: "apps"
       kind: Deployment
     - group: ""
       kind: Service
     - group: "networking.k8s.io"
       kind: Ingress


    