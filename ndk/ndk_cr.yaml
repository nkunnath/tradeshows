---
apiVersion: dataservices.nutanix.com/v1alpha1
kind: ApplicationSnapshot
metadata:
  name: wordpress-snapshot
  namespace: wordpress
spec:
  expiresAfter: "720h"
  source:
    applicationRef:
     name: wordpress

---
apiVersion: dataservices.nutanix.com/v1alpha1
kind: ReplicationTarget
metadata:
  name: replication-target-wordpress
  namespace: wordpress
spec:
  namespaceName: wordpress
  remoteName: ndk-nutanix-secondary

  
---
apiVersion: scheduler.nutanix.com/v1alpha1
kind: JobScheduler
metadata:
  name: daily-schedule
  namespace: wordpress
spec:
  daily: 
    time: 01:00
  timeZoneName: "America/Los_Angeles"

---
apiVersion: dataservices.nutanix.com/v1alpha1
kind: FileServerReplicationRelationships
metadata:
  name: wordpress-fssr
spec:
  remoteName: ndk-nutanix-secondary
  relationships:
    - primaryFileserverFQDN: files.ntnxlab.local
      recoveryFileserverFQDN: files.ntnxlab.local

---
apiVersion: dataservices.nutanix.com/v1alpha1
kind: ProtectionPlan                                                           
metadata:                                                                      
  name: daily-protection-plan
  namespace: wordpress
spec:
  scheduleName: daily-schedule
  retentionPolicy:
    retentionCount: 14
  replicationConfigs:
    - replicationTargetName: replication-target-wordpress


---
apiVersion: dataservices.nutanix.com/v1alpha1                                  
kind: AppProtectionPlan                                                           
metadata:                                                                      
  name: wordpress-app-plan
  namespace: wordpress
spec:
  applicationName: wordpress
  protectionPlanNames: ["daily-protection-plan"]