---
apiVersion: kustomize.toolkit.fluxcd.io/v1
kind: Kustomization
metadata:
  name: wordpress-gatewayapi
  namespace: flux-system
spec:
  interval: 10m
  path: ./infrastructure/gateway_api/wordpress
  prune: true
  sourceRef:
    kind: GitRepository
    name: flux-system
  postBuild:
    substituteFrom:
      - kind: ConfigMap
        name: cluster-settings # Injects wordpress.gslb.thencpnutanix.com

---
apiVersion: kustomize.toolkit.fluxcd.io/v1
kind: Kustomization
metadata:
  name: wordpress-gslb
  namespace: flux-system
spec:
  interval: 10m
  path: ./infrastructure/gslb/wordpress
  prune: true
  sourceRef:
    kind: GitRepository
    name: flux-system

---
apiVersion: kustomize.toolkit.fluxcd.io/v1
kind: Kustomization
metadata:
  name: wordpress-app
  namespace: flux-system
spec:
  interval: 10m
  path: ./applications/wordpress/base
  prune: true
  sourceRef:
    kind: GitRepository
    name: flux-system



# After failover, before bringing up the WordPress app in the primary cluster, patch the Kustomization on primary to 0 replicas.

