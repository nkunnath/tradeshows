apiVersion: cert-manager.io/v1
kind: Certificate
metadata:
  name: boutique-cert
  namespace: boutique
spec:
  secretName: boutique-tls-cert
  issuerRef:
    name: selfsigned-issuer
    kind: ClusterIssuer
  dnsNames:
    - ${BOUTIQUE_HOSTNAME}

---
apiVersion: gateway.networking.k8s.io/v1
kind: Gateway
metadata:
  name: boutique-gateway
  namespace: boutique
  annotations:
    traefik.io/router.entrypoints: web, websecure
spec:
  gatewayClassName: traefik
  listeners:
    - name: http
      protocol: HTTP
      port: 8000
      allowedRoutes:
        namespaces:
          from: Same
    - name: https
      protocol: HTTPS
      port: 8443 # Default Traefik websecure container port
      tls:
        mode: Terminate
        certificateRefs:
          - name: boutique-tls-cert # Ensure this secret exists
      allowedRoutes:
        namespaces:
          from: Same
---
apiVersion: gateway.networking.k8s.io/v1
kind: HTTPRoute
metadata:
  name: boutique-route
  namespace: boutique
spec:
  parentRefs:
    - name: boutique-gateway
  hostnames:
    - "${BOUTIQUE_HOSTNAME}"
  rules:
    - matches:
        - path:
            type: PathPrefix
            value: /
      backendRefs:
        - name: frontend
          port: 80
